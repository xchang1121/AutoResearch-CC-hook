# Framework reference tables. Editing here never needs a code change.
# Loaded once per process by .autoresearch/scripts/settings.py.
#
# DSL is the primary pivot (it's what the user writes code in). backend /
# arch / framework / device_type are derived per-DSL defaults; users override
# them with explicit --backend / --arch / --framework on /autoresearch.

# When /autoresearch is invoked without --dsl, scaffold uses this key.
default_dsl: triton_ascend

# DSL → default (backend, arch, framework, device_type) mapping. Factory
# (ar_vendored/op/verifier/adapters/factory.py) validates the DSL name
# independently; this table only supplies defaults for missing flags.
# `device_type` is the `torch.device` prefix emitted into the auto-generated
# verify / profile scripts ("npu" / "cuda" / "cpu").
dsls:
  triton_ascend:
    backend: ascend
    arch: ascend910b4
    framework: torch
    device_type: npu
  triton_cuda:
    backend: cuda
    arch: a100
    framework: torch
    device_type: cuda
  ascendc:
    backend: ascend
    arch: ascend910b4
    framework: torch
    device_type: npu
  cuda_c:
    backend: cuda
    arch: a100
    framework: torch
    device_type: cuda
  cpp:
    backend: cpu
    arch: x86_64
    framework: torch
    device_type: cpu
  tilelang_cuda:
    backend: cuda
    arch: a100
    framework: torch
    device_type: cuda
  tilelang_npuir:
    backend: ascend
    arch: ascend910b4
    framework: torch
    device_type: npu
  pypto:
    backend: cuda
    arch: a100
    framework: torch
    device_type: cuda
  swft:
    backend: ascend
    arch: ascend910b4
    framework: torch
    device_type: npu
  torch:
    backend: cpu
    arch: x86_64
    framework: torch
    device_type: cpu

# Modules that live only on the remote worker (NPU / GPU rig). Static code
# check skips import availability for these — the local dev box typically
# lacks them. Worker-side verify catches any real import error.
worker_only_modules:
  - triton
  - torch_npu
  - torch_npu_extension

# Common hallucinated script names → the real script Claude should use.
# hook_guard_bash flags these early with a targeted error rather than a
# generic "unknown script" rejection.
hallucinated_scripts:
  eval.py: eval_wrapper.py
  run_eval.py: eval_wrapper.py
  verify.py: eval_wrapper.py
  check.py: quick_check.py
  run.py: eval_wrapper.py
  test.py: quick_check.py
  profile.py: eval_wrapper.py
