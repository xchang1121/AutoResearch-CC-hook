# 远端 worker 清单。配合 README「启动远端 worker」使用。
# machines : 每台机器一次填好的固定参数。
# workers  : 每个 worker 实例的运行时参数，对应
#            `python .autoresearch/scripts/ar_cli.py worker --start` 的 flags。

machines:
  npu:
    ssh_host:       # 本地 ~/.ssh/config 里的远端机器别名
    project_dir:    # claude-autoresearch 在远端的路径
    env_activate:   # 激活 python 环境的一行命令（conda activate / source venv/bin/activate / source env.sh 等）

workers:
  - name: npu-b2-4              # 本地记号，用于人类引用
    machine: npu                # 对应上面 machines 里的 key
    backend: ascend
    arch: ascend910b3           # 由 npu-smi info Name 列决定
    devices: [5]                # NPU 下标；多卡写 [1,2,3] 这样的格式
    port: 9111                  # 本机端口，一 worker 一端口
